mode = "rpc"

[rpc]
target_url = "http://ip/rpc"
reference_url = "http://ip/rpc"
commitment = "finalized"
timeout_secs = 4

[identity]
node_pubkey = "BaDhUB1eWfunwD21Tu3WywyYQ9wZx5hS9WXeHHNGZUPy"
vote_pubkey = ""

[exporter]
listen_addr = "0.0.0.0:9898"
poll_interval_secs = 120
state_path = "/var/lib/solana-kpi-exporter/state.json"
log_level = "info"

[uptime]
window_hours = 720
max_sync_lag_slots = 150
max_last_vote_lag_slots = 8
max_root_lag_slots = 64
require_health_ok = true
require_not_delinquent = false

[features]
enable_vote_metrics = false
enable_skip_rate = false
enable_balance_metrics = true
enable_snapshot_metrics = true
enable_sync_metrics = true
enable_rpc_status_metrics = true

[slo]
uptime_target_pct = 99.95
voting_effectiveness_target_pct = 99.8
skip_rate_target_pct = 0.0
